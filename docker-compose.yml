services:
  db:
    image: postgres:15-alpine
    container_name: hsa-db
    restart: always
    environment:
      POSTGRES_DB: hsadb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: