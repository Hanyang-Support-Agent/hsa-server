name: HSA CI/CD Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  # CI: 빌드 및 테스트 검증
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # GitHub Secrets에 저장된 yml 내용을 파일로 생성
      - name: Inject application.yml
        run: |
          mkdir -p ./hsa-core/src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > ./hsa-core/src/main/resources/application.yml

      - name: Build with Gradle
        run: ./gradlew clean build -x test

